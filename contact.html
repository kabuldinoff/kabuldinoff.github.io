<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="contact-section">
<header class="site-header">
    <nav>
        <ul class="main-navigation-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>
<main class="content-wrapper">
    <h1>Contact</h1>
    <div class="contact-intro">
        <h2 class="contact-title">Get in Touch</h2>
        <p class="contact-description">
            Fill out the form below and I'll get back to you as soon as possible.
        </p>
    </div>
    <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="0e24c31c-98b5-4b68-8be6-cfd744ea6294" />
        <input type="hidden" name="subject" value="New Contact Form Submission from Web3Forms" />
        <input type="hidden" name="from_name" value="My Website" />
        <div class="form-group-container">
            <div class="form-group">
                <label for="name" class="form-label">Name <span class="required-asterisk">*</span></label>
                <input id="name" name="name" class="form-input" placeholder="Your name" type="text" required />
            </div>
            <div class="form-group">
                <label for="email" class="form-label">Email <span class="required-asterisk">*</span></label>
                <input id="email" name="email" class="form-input" placeholder="Your email" type="email" required />
            </div>
            <div class="form-group">
                <label for="phone" class="form-label">Phone</label>
                <input id="phone" name="phone" class="form-input" placeholder="+1 (234) 56789" type="text" />
            </div>
            <div class="form-group">
                <label for="message" class="form-label">Message <span class="required-asterisk">*</span></label>
                <textarea class="form-textarea" id="message" name="message" placeholder="Your message" required></textarea>
            </div>
        </div>
        <button class="form-submit" type="submit">Send Message</button>
        <!--TODO: custom message box that someone sent a message successfully: "Thank you, I will be back soon to you"-->
    </form>
</main>
<footer class="site-footer">
    <p class="footer-copyright">
        <img src="img/icons/icon-copyright.svg" alt="arrow" class="footer-icon-inline">
        2026 Alibek Kabuldinov. All rights reserved.
    </p>
    <div class="footer-links">
        <a href="https://www.linkedin.com/in/kabuldinov/" target="_blank" aria-label="LinkedIn">
            <img src="img/icons/icon-linkedin.svg" alt="LinkedIn" class="footer-icon">
        </a>
        <a href="https://github.com/kabuldinoff" target="_blank" aria-label="GitHub">
            <img src="img/icons/icon-github.svg" alt="GitHub" class="footer-icon">
        </a>
        <a href="https://buymeacoffee.com/kabuldinov" target="_blank" aria-label="Buy me a Coffee">
            <img src="img/icons/icon-coffee.svg" alt="Coffee" class="footer-icon">
        </a>
    </div>
</footer>
</body>
</html>
